{% extends "base.html" %}

{% block title %}Login / Register - DeFi Dashboard{% endblock %}

{% block container_class %}grid-sm mt-2{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<h2 class="text-center mt-2 mb-2">Welcome</h2>
<div class="columns">
    <div class="column col-12">
        <div class="card">
            <div class="card-header">
                <div class="card-title h5">Login or Register</div>
            </div>
            <div class="card-body">
                <form id="auth-form">
                    <div class="form-group">
                        <label class="form-label" for="input-email">Email</label>
                        <input class="form-input" type="email" id="input-email" placeholder="Email">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="input-password">Password</label>
                        <input class="form-input" type="password" id="input-password" placeholder="Password">
                    </div>
                </form>
            </div>
            <div class="card-footer">
                <button type="button" class="btn btn-primary" id="login-btn">Login</button>
                <button type="button" class="btn btn-link" id="register-btn">Register</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script type="module" src="{{ url_for('static', filename='login.js') }}"></script>
{% endblock %}
