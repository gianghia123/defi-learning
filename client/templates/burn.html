{% extends "base.html" %}

{% block title %}Burn Tokens - DeFi Dashboard{% endblock %}

{% block content %}
<div class="columns mt-2">
    <div class="column col-6 col-mx-auto">
        <div class="card">
            <div class="card-header">
                <div class="card-title h5 text-error">Burn Tokens</div>
                <div class="card-subtitle text-gray">Permanently remove tokens from your balance.</div>
            </div>
            <div class="card-body">
                <div class="toast toast-warning mb-2">
                    Warning: Burning tokens cannot be undone.
                </div>
                <form id="burn-form">
                    <div class="form-group">
                        <label class="form-label" for="burn-amount">Amount to Burn</label>
                        <div class="input-group">
                            <input type="number" class="form-input" id="burn-amount" placeholder="0.00">
                            <span class="input-group-addon">TKN</span>
                        </div>
                    </div>
                </form>
            </div>
            <div class="card-footer">
                <button class="btn btn-error" type="button">Confirm Burn</button>
                <a href="{{ url_for('index') }}" class="btn btn-link">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
