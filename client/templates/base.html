<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DeFi Learning{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="brand">DeFi Learning</a>
        {% if session.get('user_id') %}
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/wallet">Wallet</a>
            <a href="/transfer">Transfer</a>
            <a href="/burn">Burn</a>
            <a href="/mint">Mint</a>
            <button id="logout-btn" class="link-btn">Logout</button>
        </div>
        {% else %}
        <div class="nav-links">
            <a href="/login">Login</a>
            <a href="/register">Register</a>
        </div>
        {% endif %}
    </nav>

    <main>
        <div id="flash-msg" class="flash hidden"></div>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <script src="{{ url_for('static', filename='helpers.js') }}"></script>
    <script src="{{ url_for('static', filename='wallet.js') }}"></script>
    <script src="{{ url_for('static', filename='pages.js') }}"></script>
</body>
</html>
