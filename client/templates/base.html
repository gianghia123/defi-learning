<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DeFi Dashboard{% endblock %}</title>
    <!-- Use url_for to load static files -->
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/spectre.min.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <div class="container {% block container_class %}grid-lg{% endblock %}">
        {% block header %}
        <header class="navbar mt-2 mb-2">
            <section class="navbar-section">
                <a href="{{ url_for('index') }}" class="navbar-brand mr-2 text-bold">DeFi Dashboard</a>
            </section>
            <section class="navbar-section">
                {% block nav_items %}
                <a href="{{ url_for('index') }}" class="btn btn-link">Home</a>
                {% endblock %}
            </section>
        </header>
        {% endblock %}

        {% block content %}{% endblock %}
        <script type="module" src="{{ url_for('static', filename='utils.js') }}"></script>
        <script type="module" src="{{ url_for('static', filename='ethers.min.js') }}"></script>
        <script type="module" src="{{ url_for('static', filename='walletmanager.js') }}"></script>
        <script type="module" src="{{ url_for('static', filename='contract.js') }}"></script>
        {% block extra_js %}{% endblock %}
    </div>
</body>

</html>
